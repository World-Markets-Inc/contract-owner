name: Forge Tests

on:
  push:
  pull_request:

jobs:
  test:
    name: Run Forge tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        run: forge install foundry-rs/forge-std --no-git

      - name: Run tests
        run: forge test -vvv
