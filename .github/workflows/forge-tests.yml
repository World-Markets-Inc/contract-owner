name: Forge Tests

on:
  push:
  pull_request:

jobs:
  test:
    name: Run Forge tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show Forge version
        run: forge --version

      - name: Run tests
        run: forge test -vvv
